{% extends 'base.html' %}
{% load static %}

{% block content %}

<style>
.register-page {
    background-image: url("{% static 'images/register-bg.jpg' %}");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

.register-page::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(8px);
}

.register-box {
    position: relative;
    z-index: 2;
    width: 800px;
    padding: 35px;
    border-radius: 15px;
    background: rgba(255,255,255,0.10);
    backdrop-filter: blur(18px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    color: white;
}

.register-box h2 {
    text-align: center;
    margin-bottom: 25px;
    font-size: 42px;
    font-weight: bold;
    color: white;
}

.register-box label {
    color: white;
    font-weight: 500;
}

.register-box input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: none;
}

.register-box ul {
    color: #f8f9fa;
}

.helptext {
    color: #ddd;
}

.register-box button {
    margin-top: 15px;
}
</style>

<div class="register-page">
    <div class="register-box">

        <h2>Create Account</h2>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn btn-primary w-100">
                Register
            </button>
        </form>

    </div>
</div>

{% endblock %}
